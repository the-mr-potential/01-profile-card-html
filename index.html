<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Set character encoding for proper text display -->
    <meta charset="UTF-8">
    <!-- Make the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Compatibility for Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Page title shown in browser tab -->
    <title>Asher's Profile Card</title>
    <!-- Link to external CSS stylesheet for styling -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Main content container for the page -->
    <main>
      <!-- Profile card section with class for styling -->
      <section class="profile-card">
        <!-- Profile image -->
        <img src="img/dog.png" alt="Profile picture">
        <!-- Main heading with profile name -->
        <h1>Asher Hazen</h1>
        <!-- Subheading with job title -->
        <h2>Front-End Developer</h2>
        <!-- Description paragraph about skills and interests -->
        <p>Passionate about crafting clean, responsive web experiences with HTML, CSS, and JavaScript. Always learning new design patterns and UI techniques to build accessible apps.</p>

        <!-- New heading -->
        <h3>My Favorite Websites</h3>
        <!-- Bulleted list of links -->
        <ul>
          <li><a href="https://www.crunchyroll.com/discover">Crunchyroll</a></li>
          <li><a href="https://www.youtube.com/">YouTube</a></li>
          <li><a href="https://anilist.co/login">AniList</a></li>
          <li><a href="https://www.github.com">GitHub</a></li>
        </ul>
      </section>
    </main>
    <!-- Link to external JavaScript file for interactivity -->
    <script src="script.js"></script>
  </body>
</html>
